<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <!-- Background -->
  <rect width="800" height="540" fill="#080C10"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="800" height="3" fill="#38BDF8"/>

  <!-- Header background -->
  <rect x="0" y="3" width="800" height="88" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="#F0F6FC" letter-spacing="4">SIZE CHART</text>

  <!-- Brand badge -->
  <rect x="315" y="54" width="170" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38BDF8" stroke-width="1"/>
  <text x="400" y="72" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#38BDF8" letter-spacing="5">JERSEY</text>

  <!-- Divider line -->
  <rect x="40" y="94" width="720" height="1.5" fill="#38BDF8" opacity="0.4"/>

  <!-- Header row -->
  <rect x="40" y="96" width="720" height="42" fill="#161B22"/>
  <rect x="40" y="96" width="3" height="42" fill="#38BDF8"/>
  <text x="90"  y="123" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#38BDF8" letter-spacing="1">SIZE</text>
  <text x="230" y="123" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#38BDF8" letter-spacing="1">CHEST (cm)</text>
  <text x="400" y="123" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#38BDF8" letter-spacing="1">CHEST (in)</text>
  <text x="570" y="123" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#38BDF8" letter-spacing="1">HEIGHT (cm)</text>
  <text x="710" y="123" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#38BDF8" letter-spacing="1">WEIGHT</text>
  <rect x="40" y="138" width="720" height="1" fill="#1C2128"/>

  <!-- Row S -->
  <rect x="40" y="139" width="720" height="38" fill="#0D1117"/>
  <text x="90"  y="164" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#38BDF8">S</text>
  <text x="230" y="164" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">86 – 91</text>
  <text x="400" y="164" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">34 – 36"</text>
  <text x="570" y="164" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">155 – 165</text>
  <text x="710" y="164" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">55–65 kg</text>
  <rect x="40" y="177" width="720" height="1" fill="#1C2128"/>

  <!-- Row M -->
  <rect x="40" y="178" width="720" height="38" fill="#161B22"/>
  <text x="90"  y="203" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#38BDF8">M</text>
  <text x="230" y="203" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">92 – 97</text>
  <text x="400" y="203" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">36 – 38"</text>
  <text x="570" y="203" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">165 – 175</text>
  <text x="710" y="203" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">65–75 kg</text>
  <rect x="40" y="216" width="720" height="1" fill="#1C2128"/>

  <!-- Row L -->
  <rect x="40" y="217" width="720" height="38" fill="#0D1117"/>
  <text x="90"  y="242" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#38BDF8">L</text>
  <text x="230" y="242" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">98 – 103</text>
  <text x="400" y="242" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">38.5 – 40.5"</text>
  <text x="570" y="242" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">175 – 183</text>
  <text x="710" y="242" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">75–85 kg</text>
  <rect x="40" y="255" width="720" height="1" fill="#1C2128"/>

  <!-- Row XL -->
  <rect x="40" y="256" width="720" height="38" fill="#161B22"/>
  <text x="90"  y="281" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#38BDF8">XL</text>
  <text x="230" y="281" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">104 – 109</text>
  <text x="400" y="281" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">41 – 43"</text>
  <text x="570" y="281" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">183 – 190</text>
  <text x="710" y="281" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">85–95 kg</text>
  <rect x="40" y="294" width="720" height="1" fill="#1C2128"/>

  <!-- Row XXL -->
  <rect x="40" y="295" width="720" height="38" fill="#0D1117"/>
  <text x="90"  y="320" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#38BDF8">XXL</text>
  <text x="230" y="320" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">110 – 116</text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">43 – 45.5"</text>
  <text x="570" y="320" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">190 – 198</text>
  <text x="710" y="320" text-anchor="middle" font-family="Arial" font-size="13" fill="#F0F6FC">95–110 kg</text>

  <!-- Bottom border of table -->
  <rect x="40" y="333" width="720" height="1.5" fill="#38BDF8" opacity="0.3"/>

  <!-- How to measure section -->
  <text x="400" y="368" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="12" fill="#38BDF8" letter-spacing="3">HOW TO MEASURE</text>

  <!-- Bullet 1 -->
  <rect x="60" y="380" width="6" height="6" rx="1" fill="#38BDF8" opacity="0.7"/>
  <text x="76" y="389" font-family="Arial" font-size="11.5" fill="#8B949E">Chest: Wrap tape around the fullest part of your chest, keeping it parallel to the floor.</text>

  <!-- Bullet 2 -->
  <rect x="60" y="402" width="6" height="6" rx="1" fill="#38BDF8" opacity="0.7"/>
  <text x="76" y="411" font-family="Arial" font-size="11.5" fill="#8B949E">Height: Stand straight without shoes and measure from floor to top of head.</text>

  <!-- Bullet 3 -->
  <rect x="60" y="424" width="6" height="6" rx="1" fill="#38BDF8" opacity="0.7"/>
  <text x="76" y="433" font-family="Arial" font-size="11.5" fill="#8B949E">All jerseys have a relaxed athletic fit. For a tighter look, go DOWN one size.</text>

  <!-- Divider -->
  <rect x="40" y="450" width="720" height="1" fill="#1C2128"/>

  <!-- Footer tip -->
  <text x="400" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#8B949E">💡 When in doubt between two sizes, choose the larger one for comfort</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="537" width="800" height="3" fill="#38BDF8" opacity="0.35"/>
</svg>
