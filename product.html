<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Prime Shoe Jersey Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<!-- Ticker -->
<div class="ticker-wrap"><div class="ticker-track"><span class="ticker-item">Authentic Gear</span><span class="ticker-item">COD Available</span><span class="ticker-item">Fast Delivery</span><span class="ticker-item">Easy Returns</span><span class="ticker-item">Authentic Gear</span><span class="ticker-item">COD Available</span><span class="ticker-item">Fast Delivery</span><span class="ticker-item">Easy Returns</span></div></div>

<!-- Navbar -->
<nav id="navbar">
  <div class="nav-inner">
    <div class="nav-left">
      <button id="hamburger" class="nav-icon-btn"><div class="hamburger-lines"><span></span><span></span><span></span></div></button>
    </div>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 1.5c4.69 0 8.5 3.81 8.5 8.5S16.69 20.5 12 20.5 3.5 16.69 3.5 12 7.31 3.5 12 3.5zM9 16.5v-9l7 4.5-7 4.5z"/></svg></div>
      <div class="nav-logo-text"><span class="brand-top">Prime Shoe</span><span class="brand-sub">Jersey Hub</span></div>
    </a>
    <div class="nav-right">
      <nav class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="shop.html" class="nav-link">Shop</a><a href="tracking.html" class="nav-link">Track</a></nav>
      <button class="nav-icon-btn" data-cart-trigger><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.2 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg><span class="cart-badge" style="display:none;">0</span></button>
    </div>
  </div>
</nav>
<div id="mobile-nav"><div class="mobile-nav-links"><a href="index.html" class="mobile-nav-link">🏠 Home</a><a href="shop.html" class="mobile-nav-link">🛍️ Shop</a><a href="tracking.html" class="mobile-nav-link">📦 Track Order</a></div></div>

<!-- Breadcrumb -->
<div class="page-top" style="background:var(--dark-2);border-bottom:1px solid var(--border);padding:14px 0;">
  <div class="container">
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--silver);">
      <a href="index.html" style="color:var(--silver);">Home</a>
      <span>/</span>
      <a href="shop.html" id="bc-shop" style="color:var(--silver);">Shop</a>
      <span>/</span>
      <span id="bc-product" style="color:var(--white);">Product</span>
    </div>
  </div>
</div>

<!-- Product Detail -->
<div class="container section-pad">
  <div class="pdp-layout" id="pdp-layout">
    <!-- Loading skeleton -->
    <div>
      <div class="skeleton" style="aspect-ratio:1;border-radius:20px;margin-bottom:12px;"></div>
      <div style="display:flex;gap:10px;">
        <div class="skeleton" style="width:72px;height:72px;border-radius:10px;"></div>
        <div class="skeleton" style="width:72px;height:72px;border-radius:10px;"></div>
        <div class="skeleton" style="width:72px;height:72px;border-radius:10px;"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="skeleton" style="height:16px;width:30%;border-radius:4px;"></div>
      <div class="skeleton" style="height:40px;width:90%;border-radius:4px;"></div>
      <div class="skeleton" style="height:14px;width:50%;border-radius:4px;"></div>
      <div class="skeleton" style="height:60px;width:100%;border-radius:14px;"></div>
      <div class="skeleton" style="height:44px;width:100%;border-radius:14px;margin-top:8px;"></div>
    </div>
  </div>
</div>

<!-- Related Products -->
<section class="section-pad" style="padding-top:0;">
  <div class="container">
    <div style="margin-bottom:32px;">
      <div class="section-label">Related Products</div>
      <h2 class="section-title" style="margin-top:10px;font-size:clamp(2rem,5vw,3rem);">YOU MAY ALSO LIKE</h2>
    </div>
    <div class="grid-products" id="related-grid"></div>
  </div>
</section>

<!-- Footer -->
<footer style="background:var(--dark-2);border-top:1px solid var(--border);padding:32px 0;">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
    <span style="font-size:13px;color:var(--silver);">© 2025 Prime Shoe Jersey Hub</span>
    <div style="display:flex;gap:8px;"><div class="payment-badge">COD</div><div class="payment-badge">UPI</div><div class="payment-badge">Visa</div></div>
  </div>
</footer>

<!-- Mobile Sticky CTA -->
<div id="mobile-cta" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.95);border-top:1px solid var(--border);padding:12px 16px;backdrop-filter:blur(10px);">
  <div style="display:flex;gap:10px;">
    <button id="mob-atc" class="btn btn-neon ripple-btn" style="flex:1;padding:14px;">Add to Cart</button>
    <button id="mob-buy" class="btn btn-outline ripple-btn" style="padding:14px 20px;">Buy Now</button>
  </div>
</div>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/app.js"></script>
<script>
let currentProduct = null;
let selectedSize = null;
let qty = 1;
let currentImgIdx = 0;

function renderProduct(product) {
  currentProduct = product;
  document.title = `${product.name} — Prime Shoe Jersey Hub`;

  const disc = getDiscountPct(product);
  const badge = BADGE_CONFIG[product.badge];
  const stars = '★'.repeat(Math.floor(product.rating));
  const savings = product.originalPrice - product.price;
  const stockPct = Math.min(100, (product.stock / 20) * 100);

  // Breadcrumb
  document.getElementById('bc-shop').href = `shop.html?cat=${product.category}`;
  document.getElementById('bc-shop').textContent = product.category.charAt(0).toUpperCase() + product.category.slice(1);
  document.getElementById('bc-product').textContent = product.name;

  document.getElementById('pdp-layout').innerHTML = `
    <!-- LEFT: Gallery -->
    <div class="pdp-gallery">
      <div class="pdp-main-img" id="pdp-main">
        <img id="pdp-main-img" src="${product.images[0]}" alt="${product.name}"
          onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800&q=70'" />
      </div>
      <div class="pdp-thumbs">
        ${product.images.map((img, i) => `
          <div class="pdp-thumb${i===0?' active':''}" onclick="switchImg(${i})">
            <img src="${img}" alt="view ${i+1}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&q=70'" />
          </div>
        `).join('')}
      </div>
    </div>

    <!-- RIGHT: Info -->
    <div>
      <div class="pdp-category">${product.brand} · ${product.category.toUpperCase()}</div>
      <h1 class="pdp-name">${product.name}</h1>

      <!-- Rating -->
      <div class="pdp-rating">
        <span style="color:var(--neon);font-size:1rem;letter-spacing:2px;">${stars}</span>
        <span style="font-family:var(--font-cond);font-weight:700;font-size:14px;">${product.rating}</span>
        <span style="color:var(--silver);font-size:13px;">(${product.reviews} reviews)</span>
        <span style="font-family:var(--font-cond);font-weight:700;font-size:11px;color:var(--green);letter-spacing:0.08em;">✓ VERIFIED</span>
      </div>

      <!-- Price -->
      <div class="pdp-price-block">
        <div>
          <div class="pdp-price-current">${formatPrice(product.price)}</div>
        </div>
        <div>
          <div class="pdp-price-original">${formatPrice(product.originalPrice)}</div>
          <div class="pdp-price-save">You save ${formatPrice(savings)} (${disc}% off)</div>
        </div>
        ${badge ? `<span class="badge ${badge.cls}">${badge.label}</span>` : ''}
      </div>

      <!-- Urgency -->
      ${product.stock <= 8 ? `
      <div class="pdp-urgency">
        <div class="pdp-urgency-dot"></div>
        <div class="pdp-urgency-text">⚡ Only ${product.stock} left in stock — order soon!</div>
      </div>
      <div style="margin-bottom:20px;">
        <div class="stock-bar"><div class="stock-bar-fill" style="width:${stockPct}%;"></div></div>
        <div style="font-size:11px;color:var(--silver);font-family:var(--font-cond);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-top:4px;">${stockPct.toFixed(0)}% Sold · Hurry!</div>
      </div>` : ''}

      <!-- Size Selection -->
      <div style="margin-bottom:24px;">
        <div class="pdp-size-label">
          <span style="font-family:var(--font-cond);font-weight:700;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;">
            Select Size <span id="selected-size-display" style="color:var(--neon);"></span>
          </span>
          <span class="pdp-size-guide" onclick="showToast('Size guide coming soon!')">Size Guide →</span>
        </div>
        <div class="size-grid">
          ${product.sizes.map(s => `
            <button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>
          `).join('')}
        </div>
      </div>

      <!-- Qty -->
      <div class="pdp-qty" style="margin-bottom:24px;">
        <span style="font-family:var(--font-cond);font-weight:700;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);margin-right:8px;">Quantity:</span>
        <button class="pdp-qty-btn" onclick="changeQty(-1)">−</button>
        <span class="pdp-qty-val" id="qty-display">1</span>
        <button class="pdp-qty-btn" onclick="changeQty(1)">+</button>
      </div>

      <!-- CTAs -->
      <div class="pdp-ctas">
        <button class="btn btn-neon ripple-btn" style="flex:2;padding:18px;" onclick="addToCartPDP()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.2 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          Add to Cart
        </button>
        <button class="btn btn-outline ripple-btn" style="flex:1;padding:18px;" onclick="buyNowPDP()">Buy Now</button>
      </div>

      <!-- Trust -->
      <div class="pdp-trust">
        <div class="pdp-trust-item"><div class="pdp-trust-icon">💳</div><div class="pdp-trust-label">Cash on Delivery</div><div class="pdp-trust-sub">Pay on arrival</div></div>
        <div class="pdp-trust-item"><div class="pdp-trust-icon">🚀</div><div class="pdp-trust-label">Fast Delivery</div><div class="pdp-trust-sub">2–5 working days</div></div>
        <div class="pdp-trust-item"><div class="pdp-trust-icon">↩️</div><div class="pdp-trust-label">Easy Returns</div><div class="pdp-trust-sub">7-day policy</div></div>
      </div>

      <!-- Accordions -->
      <div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>Product Description</span>
            <span class="accordion-icon">▾</span>
          </div>
          <div class="accordion-body">
            <div class="accordion-content">
              <p style="margin-bottom:12px;">${product.description}</p>
              <ul style="display:flex;flex-direction:column;gap:6px;">
                ${product.features.map(f => `<li style="display:flex;align-items:center;gap:8px;"><span style="color:var(--neon);">✓</span>${f}</li>`).join('')}
              </ul>
            </div>
          </div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>Product Specifications</span>
            <span class="accordion-icon">▾</span>
          </div>
          <div class="accordion-body">
            <div class="accordion-content">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                ${Object.entries(product.specs).map(([k,v]) => `
                  <div style="background:var(--dark-3);border-radius:8px;padding:10px 14px;">
                    <div style="font-size:10px;font-family:var(--font-cond);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);margin-bottom:4px;">${k}</div>
                    <div style="font-size:14px;font-weight:600;">${v}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>Delivery & Returns</span>
            <span class="accordion-icon">▾</span>
          </div>
          <div class="accordion-body">
            <div class="accordion-content">
              <p><strong style="color:var(--neon);">Delivery:</strong> 2–5 working days PAN India. Free shipping on orders above ₹999.</p>
              <p style="margin-top:10px;"><strong style="color:var(--neon);">Cash on Delivery:</strong> Available on all orders.</p>
              <p style="margin-top:10px;"><strong style="color:var(--neon);">Returns:</strong> 7-day hassle-free returns. Contact us via WhatsApp to initiate a return.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Share -->
      <div style="margin-top:24px;display:flex;align-items:center;gap:12px;">
        <span style="font-family:var(--font-cond);font-weight:700;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);">Share:</span>
        <a href="https://wa.me/?text=Check+this+out+${encodeURIComponent(product.name)}+at+Prime+Shoe+Jersey+Hub!" target="_blank" class="btn btn-dark btn-sm">💬 WhatsApp</a>
      </div>
    </div>
  `;

  // Show mobile CTA
  if (window.innerWidth < 768) {
    document.getElementById('mobile-cta').style.display = 'block';
    document.querySelector('#pdp-layout .pdp-ctas').style.display = 'none';
    document.getElementById('mob-atc').onclick = addToCartPDP;
    document.getElementById('mob-buy').onclick = buyNowPDP;
  }

  // Reviews section (append after layout)
  renderReviewsSection(product);

  // Related
  const related = getRelatedProducts(product);
  const relGrid = document.getElementById('related-grid');
  relGrid.innerHTML = related.length > 0
    ? related.map(p => buildProductCard(p)).join('')
    : '<p style="color:var(--silver);">No related products found.</p>';
}

function renderReviewsSection(product) {
  const existing = document.getElementById('reviews-section');
  if (existing) existing.remove();

  const section = document.createElement('section');
  section.id = 'reviews-section';
  section.className = 'section-pad';
  section.style.paddingTop = '0';
  section.innerHTML = `
    <div class="container">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;">
        <div>
          <div class="section-label">Reviews</div>
          <h2 class="section-title" style="margin-top:10px;font-size:clamp(2rem,4vw,3rem);">CUSTOMER REVIEWS</h2>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--font-display);font-size:3rem;color:var(--neon);line-height:1;">${product.rating}</div>
          <div style="color:var(--neon);font-size:1.2rem;letter-spacing:2px;">★★★★★</div>
          <div style="color:var(--silver);font-size:13px;margin-top:4px;">${product.reviews} verified reviews</div>
        </div>
      </div>
      <div class="review-grid">
        ${product.reviewsList.map(r => `
          <div class="review-card">
            <div class="review-header">
              <div class="review-avatar" style="background:${['var(--neon)','#60a5fa','#f97316','#a78bfa'][Math.floor(Math.random()*4)]};color:var(--dark);">${r.name.charAt(0)}</div>
              <div><div class="review-name">${r.name}</div><div class="review-loc">${r.city} · ${r.date}</div></div>
            </div>
            <div class="review-stars">${'★'.repeat(r.rating)}</div>
            <div class="review-text">"${r.text}"</div>
            <div class="review-verified">✓ Verified Purchase</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  const relSection = document.querySelector('.section-pad:last-of-type');
  relSection.parentNode.insertBefore(section, relSection);
}

function switchImg(idx) {
  currentImgIdx = idx;
  document.getElementById('pdp-main-img').src = currentProduct.images[idx];
  document.querySelectorAll('.pdp-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function selectSize(size, btn) {
  selectedSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const display = document.getElementById('selected-size-display');
  if (display) display.textContent = `— ${size}`;
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(10, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}

function addToCartPDP() {
  if (!selectedSize) { showToast('Please select a size first!', 'error'); return; }
  cartAdd(currentProduct, selectedSize, qty);
  openCart();
}

function buyNowPDP() {
  if (!selectedSize) { showToast('Please select a size first!', 'error'); return; }
  cartAdd(currentProduct, selectedSize, qty);
  window.location.href = 'checkout.html';
}

function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.accordion-icon');
  const isOpen = body.classList.contains('open');
  // Close all
  document.querySelectorAll('.accordion-body.open').forEach(b => { b.classList.remove('open'); b.previousElementSibling.querySelector('.accordion-icon').textContent = '▾'; });
  if (!isOpen) { body.classList.add('open'); icon.textContent = '▴'; }
}

// Init
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
if (productId) {
  setTimeout(() => {
    const p = getProductById(productId);
    if (p) renderProduct(p);
    else {
      document.getElementById('pdp-layout').innerHTML = `<div style="text-align:center;padding:80px;grid-column:span 2;"><div style="font-size:3rem;margin-bottom:16px;">😕</div><h2 style="font-family:var(--font-cond);font-size:1.5rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">Product Not Found</h2><a href="shop.html" class="btn btn-neon ripple-btn">Browse Shop</a></div>`;
    }
  }, 300);
} else {
  window.location.href = 'shop.html';
}
</script>
</body>
</html>
